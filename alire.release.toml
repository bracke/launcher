name = "launcher"
description = "Keyboard-driven application launcher built on guikit"
version = "0.1.0-dev"

authors = ["Bent Bracke"]
maintainers = ["Bent Bracke <bent@bracke.dk>"]
maintainers-logins = ["bracke"]
licenses = "MIT OR Apache-2.0 WITH LLVM-exception"
website = ""
tags = ["launcher", "gui"]

executables = ["launcher"]

# Release manifest: published form of alire.toml with NO local path pins.
# The development alire.toml pins guikit/textrender to sibling checkouts; this
# file depends on their published crates instead. Keep the two manifests'
# metadata and dependency sets in sync (enforced by tools/bin/release_check).

[[depends-on]]
guikit = "*"

[[depends-on]]
textrender = "*"

[[depends-on]]
df_vulkan = "~0.1.0"

[[depends-on]]
openglada_glfw = "~0.9.0"

[[depends-on]]
utilada = "^2.9.0"
